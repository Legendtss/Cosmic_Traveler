services:
  - type: web
    name: fittrack-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: USDA_API_KEY
        sync: false
      - key: ALLOW_GEMINI_FALLBACK_IN_PRODUCTION
        value: "0"
      - key: ALLOW_DEMO_USDA_IN_PRODUCTION
        value: "1"
      - key: PYTHON_VERSION
        value: 3.12.0
