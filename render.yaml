services:
  - type: web
    name: fittrack-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      # Required: generated securely by Render.
      - key: SECRET_KEY
        generateValue: true
      # Required for AI features in production.
      - key: GEMINI_API_KEY
        sync: false
      # Optional model override (defaults to gemini-2.5-flash in app/config.py).
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # Keep strict in production unless you intentionally want local fallback.
      - key: ALLOW_GEMINI_FALLBACK_IN_PRODUCTION
        value: "0"
      - key: PYTHON_VERSION
        value: 3.12.0
